# ════════════════════════════════════════════════════════════════
# FraudLens — Alembic Database Migration Configuration
# ════════════════════════════════════════════════════════════════

[alembic]
# Path to migration scripts
script_location = alembic

# Database URL — overridden by DATABASE_URL env var in production
sqlalchemy.url = sqlite+aiosqlite:///fraudlens.db

# Template for migration revision files
# file_template = %%(rev)s_%%(slug)s

# Timezone for migration timestamps
# timezone = UTC

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
