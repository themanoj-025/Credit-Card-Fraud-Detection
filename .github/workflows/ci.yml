name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run preprocessing tests
        run: |
          pytest tests/test_preprocessing.py -v --tb=short

      - name: Run API tests
        run: |
          pytest tests/test_api.py -v --tb=short

      - name: Run all tests with coverage
        run: |
          pytest tests/ -v --cov=src --cov-report=term-missing --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort

      - name: Check formatting with black
        run: |
          black --check src/ api/ tests/ || echo "Formatting issues found (non-blocking)"

      - name: Check import sorting with isort
        run: |
          isort --check-only src/ api/ tests/ || echo "Import sorting issues found (non-blocking)"

      - name: Lint with flake8
        run: |
          flake8 src/ api/ tests/ --max-line-length=120 --ignore=E501,W503,E203 || echo "Linting issues found (non-blocking)"
