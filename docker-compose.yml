# ════════════════════════════════════════════════════════════════
# FraudLens — Docker Compose
# ════════════════════════════════════════════════════════════════

version: '3.8'

volumes:
  postgres_data:
    driver: local

services:
  # ─── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fraudlens-postgres
    environment:
      POSTGRES_DB: fraudlens
      POSTGRES_USER: fraudlens
      POSTGRES_PASSWORD: fraudlens_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraudlens -d fraudlens"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - fraudlens-net

  # ─── Redis (optional — for production rate limiting) ────────
  redis:
    image: redis:7-alpine
    container_name: fraudlens-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - fraudlens-net
    profiles:
      - prod

  # ─── FraudLens API ───────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fraudlens-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    environment:
      - PYTHONPATH=/app
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DATABASE_URL=postgresql+asyncpg://fraudlens:fraudlens_dev@postgres:5432/fraudlens
      - REDIS_URL=redis://redis:6379/0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fraudlens-net
  # ─── Streamlit Dashboard ────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fraudlens-dashboard
    command: >
      streamlit run app/streamlit_app.py
      --server.port 8501
      --server.address 0.0.0.0
      --server.headless true
    ports:
      - "8501:8501"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    environment:
      - PYTHONPATH=/app
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - fraudlens-net

  # ─── MLflow Tracking Server ─────────────────────────────────
  # Opt-in: only start when --profile training is used
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.3.0
    container_name: fraudlens-mlflow
    profiles:
      - training
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlflow/mlruns
    environment:
      - MLFLOW_TRACKING_URI=http://localhost:5000
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://fraudlens:fraudlens_dev@postgres:5432/fraudlens
      --default-artifact-root /mlflow/mlruns
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fraudlens-net

networks:
  fraudlens-net:
    driver: bridge
