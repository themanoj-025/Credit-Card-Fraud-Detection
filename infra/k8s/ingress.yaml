# ════════════════════════════════════════════════════════════════
# FraudLens — Ingress
# Routes:
#   api.fraudlens.example.com  → fraudlens-api:8000
#   app.fraudlens.example.com  → fraudlens-dashboard:8501
# ════════════════════════════════════════════════════════════════
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fraudlens-ingress
  labels:
    app: fraudlens
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60s"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.fraudlens.example.com
        - app.fraudlens.example.com
      secretName: fraudlens-tls
  rules:
    - host: api.fraudlens.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fraudlens-api
                port:
                  number: 8000
    - host: app.fraudlens.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fraudlens-dashboard
                port:
                  number: 8501
