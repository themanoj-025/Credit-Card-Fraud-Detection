# ════════════════════════════════════════════════════════════════
# FraudLens — Kustomize Base
#
# Usage:
#   kubectl kustomize infra/k8s/          # Dry-run / preview
#   kubectl apply -k infra/k8s/           # Apply to cluster
#
# Environment overlays:
#   kubectl apply -k infra/k8s/overlays/dev
#   kubectl apply -k infra/k8s/overlays/prod
# ════════════════════════════════════════════════════════════════
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - hpa.yaml
  - configmap.yaml
  - secret.yaml

commonLabels:
  app: fraudlens
  managed-by: kustomize

namePrefix: fraudlens-
