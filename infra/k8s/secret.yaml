# ════════════════════════════════════════════════════════════════
# FraudLens — Secrets (template)
#
# IMPORTANT: This is a template. In production, never check real
# secrets into version control. Use:
#   kubectl create secret generic fraudlens-secrets \
#     --from-literal=ANTHROPIC_API_KEY=sk-... \
#     --from-literal=POSTGRES_PASSWORD=...
#
# Or use an external secrets operator (External Secrets Operator,
# SOPS, Sealed Secrets, or Vault).
# ════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Secret
metadata:
  name: fraudlens-secrets
  labels:
    app: fraudlens
type: Opaque
stringData:
  # ─── API Keys ─────────────────────────────────────────────────
  # Replace with your actual Anthropic API key
  ANTHROPIC_API_KEY: ""

  # ─── Database ─────────────────────────────────────────────────
  POSTGRES_PASSWORD: "fraudlens_dev"

  # ─── Admin ────────────────────────────────────────────────────
  ADMIN_API_KEY: ""
