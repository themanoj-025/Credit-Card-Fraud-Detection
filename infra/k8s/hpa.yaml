# ════════════════════════════════════════════════════════════════
# FraudLens — HorizontalPodAutoscaler
# Scales the API deployment based on CPU utilization and RPS
# ════════════════════════════════════════════════════════════════
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fraudlens-api-hpa
  labels:
    app: fraudlens
    component: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fraudlens-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
