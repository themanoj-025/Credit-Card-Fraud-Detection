# ════════════════════════════════════════════════════════════════
# FraudLens — Prometheus Configuration
# ════════════════════════════════════════════════════════════════

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # ─── FraudLens API ───────────────────────────────────────────
  - job_name: 'fraudlens-api'
    metrics_path: /metrics
    static_configs:
      - targets:
          - 'api:8000'
        labels:
          service: 'fraudlens-api'
          environment: 'production'
